name: Dad's Desk scan

# Runs on GitHub's servers so no laptop needs to stay on.
# Times are UTC. 03:45-10:00 UTC ≈ 09:15-15:30 IST (market hours).
on:
  schedule:
    - cron: "*/15 3-10 * * 1-5"   # every 15 min, weekdays, during market hours
  workflow_dispatch:               # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run the scan (writes pwa/data.json)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DADSDESK_LANG: ${{ vars.DADSDESK_LANG }}
        run: python scan.py --once

      - name: Publish updated picks
        run: |
          git config user.name  "dads-desk-bot"
          git config user.email "bot@users.noreply.github.com"
          git add pwa/data.json data.json dads-desk.html dadsdesk.db || true
          git commit -m "update picks $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git push
